[book]
title = "Perry Documentation"
authors = ["Perry Team"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/skelpo/perry"
edit-url-template = "https://github.com/skelpo/perry/edit/main/docs/src/{path}"

[output.html.search]
enable = true
